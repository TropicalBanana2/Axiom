<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axiom</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0iIzBhMGEwYiIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjQiLz48L3N2Zz4=">
  <link rel="stylesheet" href="/asset/axiom-shell.css">
</head>
<body class="ax-ambient">

<div class="ax-app" id="app" style="display: none">
  <!-- Top bar ------------------------------------------------ -->
  <div class="ax-top">
    <div class="ax-logo">AXIOM</div>
    <div class="ax-search">
      <span style="color: var(--text-dim); font: 12px var(--font-mono)">/</span>
      <input id="global-search" placeholder="Search features, servers, sessions…" autocomplete="off">
      <span class="ax-search-kbd">Ctrl K</span>
    </div>
    <div class="ax-top-user">
      <button class="ax-btn" id="builder-btn" title="Organise the in-game panel: tabs &amp; features" onclick="axiomOpenBuilder && axiomOpenBuilder()">⚏ Panel Builder</button>
      <button class="ax-btn ghost" id="logout-btn" title="Clear local token + reload">reset</button>
    </div>
  </div>

  <!-- Left: sessions list + tools ---------------------------- -->
  <div class="ax-left">
    <div class="ax-section">
      <div class="ax-section-head">
        <span>sessions <span id="session-count" style="color: var(--text-dim)"></span></span>
        <span style="display:flex;gap:4px">
          <button class="ax-icon-btn" id="new-party-btn" title="Create a party of sessions">⊕</button>
          <button class="ax-icon-btn" id="new-session-btn" title="New session">+</button>
        </span>
      </div>
      <div class="ax-section-body" id="session-list"></div>
    </div>
  </div>

  <!-- Main: detail / play ------------------------------------ -->
  <div class="ax-main" id="main"></div>

  <!-- Right: server tools ------------------------------------ -->
  <div class="ax-right">
    <div class="ax-section">
      <div class="ax-section-head"><span>auto upgrade</span></div>
      <div class="ax-section-body" id="smart-upgrade" style="padding: 8px 14px"></div>
    </div>
    <div class="ax-section">
      <div class="ax-section-head"><span>server toggles</span></div>
      <div class="ax-section-body" id="server-toggles" style="padding: 8px 14px"></div>
    </div>
    <div class="ax-section">
      <div class="ax-section-head"><span>party refiller</span></div>
      <div class="ax-section-body" id="party-refiller" style="padding: 8px 14px"></div>
    </div>
  </div>

  <!-- Status bar --------------------------------------------- -->
  <div class="ax-bar">
    <span class="ax-bar-dot" id="ws-dot"></span>
    <span id="ws-label">connecting…</span>
    <span style="color: var(--border-h)">·</span>
    <span id="ws-host">ws://localhost:8090</span>
    <span style="flex: 1"></span>
    <span>axiom v0.1 · localhost</span>
  </div>
</div>

<!-- New session modal --------------------------------------- -->
<div class="ax-modal-bg" id="new-modal">
  <div class="ax-modal">
    <h2>Spawn a session</h2>
    <div class="ax-field">
      <label>Label</label>
      <input class="ax-input" id="ns-label" maxlength="30" value="Main">
    </div>
    <div class="ax-field">
      <label>Player name (in-game)</label>
      <input class="ax-input" id="ns-name" maxlength="29" value="Player">
    </div>
    <div class="ax-grid-2">
      <div class="ax-field">
        <label>Server</label>
        <select class="ax-input" id="ns-server"></select>
      </div>
      <div class="ax-field">
        <label>Party Share Key <span style="color: var(--text-dim); font-weight: 400">(optional)</span></label>
        <input class="ax-input" id="ns-psk" maxlength="20" placeholder="20-char psk or blank">
      </div>
    </div>
    <div class="ax-actions">
      <button class="ax-btn primary" id="ns-submit">Spawn</button>
      <button class="ax-btn ghost" id="ns-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Create party modal -------------------------------------- -->
<div class="ax-modal-bg" id="party-modal">
  <div class="ax-modal">
    <h2>Create a party</h2>
    <div class="ax-field">
      <label>Player name (in-game) <span style="color: var(--text-dim); font-weight: 400">(shared by all)</span></label>
      <input class="ax-input" id="np-name" maxlength="29" value="Player">
    </div>
    <div class="ax-grid-2">
      <div class="ax-field">
        <label>Server</label>
        <select class="ax-input" id="np-server"></select>
      </div>
      <div class="ax-field">
        <label>Sessions</label>
        <input class="ax-input" id="np-count" type="number" min="1" max="20" value="4">
      </div>
    </div>
    <div style="color:var(--text-dim);font:11px var(--font-mono);margin:-2px 0 10px">
      Spawns a leader, waits for its party key, then joins the rest in.
    </div>
    <div class="ax-actions">
      <button class="ax-btn primary" id="np-submit">Create</button>
      <button class="ax-btn ghost" id="np-cancel">Cancel</button>
    </div>
  </div>
</div>

<script src="/asset/server-list.js"></script>
<script src="/asset/axiom-client.js"></script>

</body>
</html>
